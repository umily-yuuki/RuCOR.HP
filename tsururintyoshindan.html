<style>
  :root{
    --color-bg:#f3f2f2;
    --color-text:#201f1d;
    --color-divider:rgba(32,31,29,0.16);
    --color-neutral-700:#605d5d;
    --color-neutral-900:#2d2b2b;
    --color-accent:#b68235;
    --color-accent-700:#7d5411;
    --color-accent-900:#3a270d;
    --font-heading:"Shippori Mincho","Noto Serif JP",serif;
    --font-body:"Noto Serif JP",serif;
    --radius-md:4px;
    --space-1:5px; --space-2:9px; --space-3:14px; --space-4:18px; --space-5:23px; --space-6:28px; --space-8:37px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--color-bg); color:var(--color-text);
    font-family:var(--font-body); line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  h1,h2{ font-family:var(--font-heading); font-weight:700; margin:0; }
  a{ color:var(--color-accent-700); text-decoration:underline; text-underline-offset:2px; }
  a:hover{ color:var(--color-accent-900); }
  button{ font:inherit; }
  ::selection{ background:rgba(182,130,53,0.3); }
  @keyframes fadeIn{ from{ opacity:0; transform:translateY(6px); } to{ opacity:1; transform:translateY(0); } }

  .nav{
    display:flex; align-items:center; justify-content:space-between; gap:24px;
    padding:20px clamp(16px,5vw,64px); border-bottom:1px solid var(--color-divider);
  }
  .nav-brand{ font-family:var(--font-heading); font-size:19px; font-weight:600; letter-spacing:0.02em; }
  .nav a{ font-size:13px; text-decoration:none; color:var(--color-text); }
  .nav a:hover{ color:var(--color-accent-700); }

  .wrap{
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:clamp(24px,6vw,64px) clamp(16px,5vw,24px) 64px;
  }
  .col{ width:100%; max-width:640px; }

  .hero{ text-align:center; margin-bottom:var(--space-8); }
  .hero img{ width:100%; height:auto; border-radius:var(--radius-md); margin-bottom:var(--space-4); display:block; }
  .kicker{ font-size:12px; letter-spacing:0.25em; color:var(--color-accent-700); text-transform:uppercase; margin-bottom:var(--space-3); }
  .rule-sm{ width:48px; margin:0 auto; border-top:1px solid var(--color-divider); }

  .step-row{ display:flex; align-items:center; justify-content:space-between; }
  .step-count{ font-variant-numeric:tabular-nums; font-size:12px; letter-spacing:0.1em; color:var(--color-neutral-700); }
  .progress-track{ width:100%; height:2px; background:var(--color-divider); position:relative; margin:var(--space-4) 0; }
  .progress-bar{ position:absolute; left:0; top:0; height:100%; background:var(--color-accent); transition:width 0.3s ease; }

  .q-title{ text-align:center; margin-bottom:var(--space-2); }
  .q-title h2{ font-size:clamp(24px,5vw,32px); line-height:1.4; }
  .q-hint{ text-align:center; font-size:13px; color:var(--color-neutral-700); font-style:italic; margin:0 0 var(--space-6); }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px; cursor:pointer;
    text-decoration:none; font-family:var(--font-heading); font-weight:600; font-size:14px;
    color:var(--color-text); background:transparent; border:1px solid var(--color-divider);
    padding:12px 20px; border-radius:var(--radius-md); transition:background 0.15s ease;
  }
  .btn-block{ width:100%; }
  .btn-option{ text-align:left; justify-content:flex-start; padding:var(--space-4) var(--space-6); font-size:16px; margin-bottom:var(--space-3); }
  .btn-option:hover{ background:rgba(32,31,29,0.06); }
  .btn-primary{ color:var(--color-accent-700); border-color:var(--color-accent); }
  .btn-primary:hover{ background:rgba(182,130,53,0.12); }
  .btn-ghost{ border-color:transparent; color:var(--color-accent-700); padding-left:0; }
  .btn-ghost:hover{ background:rgba(182,130,53,0.1); }
  .btn-icon{ width:38px; height:38px; padding:0; border-color:var(--color-divider); color:var(--color-accent-700); }
  .btn-icon:hover{ background:rgba(182,130,53,0.1); }

  .tag{ display:inline-flex; font-size:11px; letter-spacing:0.02em; padding:4px 12px; border-radius:3px; background:#fff3e4; color:#5a3b0a; }

  .card{ border:1px solid var(--color-divider); border-radius:var(--radius-md); }
  .card-elev{ box-shadow:0 1px 2px rgba(45,43,43,0.14); }

  .result-title-row{ display:flex; align-items:flex-end; justify-content:center; gap:var(--space-3); }
  .result-title-row h1{ font-size:clamp(30px,6vw,44px); line-height:1.15; }
  .result-kana{ font-size:12px; color:var(--color-neutral-700); margin-top:2px; display:block; text-align:center; }

  .product-cards{ display:flex; gap:var(--space-4); width:100%; }
  .product-card{ flex:1; padding:var(--space-5); text-align:center; }
  .product-plate{
    width:100%; aspect-ratio:1/1; margin-bottom:var(--space-3); display:flex; align-items:center;
    justify-content:center; overflow:hidden; background:var(--color-bg); border-radius:var(--radius-md);
  }
  .product-plate img{ width:100%; height:100%; object-fit:contain; }
  .product-label{ font-size:11px; letter-spacing:0.15em; color:var(--color-neutral-700); text-transform:uppercase; margin-bottom:var(--space-2); }
  .product-name{ font-family:var(--font-heading); font-size:24px; color:var(--color-accent-700); }
  .product-kana{ font-size:10px; color:var(--color-neutral-700); margin-top:2px; }

  .alt-row{ display:flex; gap:var(--space-3); width:100%; }
  .alt-box{
    flex:1; padding:var(--space-3); border-radius:var(--radius-md); text-align:center;
    cursor:pointer; font:inherit; transition:background 0.15s ease, border-color 0.15s ease;
  }
  .alt-label{ font-size:11px; color:var(--color-neutral-700); margin-bottom:var(--space-1); }
  .alt-combo{ font-family:var(--font-heading); font-size:14px; color:var(--color-text); }
  .alt-kana{ font-size:9px; color:var(--color-neutral-700); margin-top:1px; }

  .review-card{ width:100%; padding:var(--space-6); }
  .review-label{ font-size:11px; letter-spacing:0.15em; color:var(--color-accent-700); text-transform:uppercase; text-align:center; margin-bottom:var(--space-4); }
  .review-stats{ display:flex; margin-bottom:var(--space-5); border-top:1px solid var(--color-divider); border-bottom:1px solid var(--color-divider); }
  .review-stat{ flex:1; padding:var(--space-4) var(--space-2); text-align:center; border-right:1px solid var(--color-divider); }
  .review-stat:last-child{ border-right:none; }
  .review-stat-num{ font-family:var(--font-heading); font-variant-numeric:tabular-nums; font-size:28px; color:var(--color-accent-700); }
  .review-stat-unit{ font-size:13px; color:var(--color-neutral-700); }
  .review-stat-label{ font-size:11px; color:var(--color-neutral-700); margin-top:var(--space-1); }
  .review-voice{ font-size:14px; line-height:1.9; color:var(--color-text); text-align:justify; margin:0; padding-left:var(--space-3); border-left:2px solid var(--color-accent); }

  .booster-card{ width:100%; padding:var(--space-5); border-color:var(--color-neutral-900); display:flex; gap:var(--space-4); align-items:center; }
  .booster-plate{ flex-shrink:0; width:128px; height:128px; display:flex; align-items:center; justify-content:center; overflow:hidden; border-radius:var(--radius-md); background:var(--color-bg); }
  .booster-plate img{ width:100%; height:100%; object-fit:contain; }
  .booster-kicker{ font-size:11px; letter-spacing:0.15em; color:var(--color-neutral-700); text-transform:uppercase; margin-bottom:var(--space-2); }
  .booster-name{ font-family:var(--font-heading); font-size:22px; color:var(--color-accent-700); }
  .booster-name-kana{ font-size:11px; color:var(--color-neutral-700); }
  .booster-headline{ font-family:var(--font-heading); font-size:20px; color:var(--color-text); margin:var(--space-2) 0; }
  .booster-tagline{ font-size:12px; letter-spacing:0.1em; color:var(--color-accent-700); margin-bottom:var(--space-2); }
  .booster-desc{ font-size:14px; line-height:1.8; margin:0; }

  .caution{ font-size:13px; line-height:1.9; color:var(--color-neutral-700); text-align:center; font-style:italic; }
  .share-row{ display:flex; gap:var(--space-3); }
  .footer-note{ margin-top:var(--space-8); font-size:11px; letter-spacing:0.1em; color:var(--color-neutral-700); }

  .stack{ display:flex; flex-direction:column; gap:var(--space-6); animation:fadeIn 0.4s ease; }
  .gap-3{ gap:var(--space-3); } .gap-4{ gap:var(--space-4); }
</style>

<div class="wrap">

    <div id="app"></div>

    <div style="text-align:center;" class="footer-note">つるりんちょ。 HOME CARE SYSTEM</div>

</div>

<script>
const QUESTIONS = [
  { key: 'hairType', text: 'あなたの髪質は？', hint: '髪の硬さで、土台となるシャンプーの選び方が変わります。', options: [
    { label: '軟毛・細毛', value: -1 },
    { label: '普通毛', value: 0 },
    { label: '硬毛・太い毛', value: 1 },
  ]},
  { key: 'damage', text: '髪のダメージレベルは？', hint: 'ダメージの度合いで、必要な補修力が決まります。', options: [
    { label: '低い（ほぼ未経験）', value: 0 },
    { label: '中くらい（カラーやパーマの経験あり）', value: 1 },
    { label: '高い（ブリーチ・ハイダメージ毛）', value: 2 },
  ]},
  { key: 'styling', text: 'アイロンやスタイリング剤の使用頻度は？', hint: '頭皮や髪への蓄積ダメージをチェックします。', options: [
    { label: 'ほとんど使わない', value: 0 },
    { label: '週2〜3回', value: 1 },
    { label: 'ほぼ毎日', value: 2 },
  ]},
  { key: 'scalp', text: '頭皮や地肌の悩みは？', hint: '素髪環境が整っているかで、仕上がりの持続力が変わります。', options: [
    { label: '特にない', value: 0 },
    { label: 'べたつき・匂いが気になる', value: 1 },
  ]},
  { key: 'finish', text: '理想の仕上がりは？', hint: '最後に、なりたい質感から最適な組み合わせを導きます。', options: [
    { label: '軽くさらり', value: -1 },
    { label: 'バランス良く', value: 0 },
    { label: 'しっとりまとまる', value: 1 },
  ]},
];

const COMBOS = {
  'REPAIR_AIR': { finish: '一番軽め', desc: 'ダメージケアをしながら、軽さを残したい方にぴったりの組み合わせです。' },
  'REPAIR_REPAIR': { finish: '軽め', desc: '補修感は欲しいけれど、しっとりしすぎたくない方におすすめです。' },
  'REPAIR_REGULAR': { finish: 'やや軽め', desc: '軽さもまとまりも、両方欲しい方のための組み合わせです。' },
  'REGULAR_AIR': { finish: 'ややしっとり', desc: 'まとまりは欲しいけれど、しっとりしすぎたくない方におすすめです。' },
  'REGULAR_REPAIR': { finish: 'しっとり寄り', desc: '乾燥やダメージが気になる方に、しっとり寄りの仕上がりを届けます。' },
  'REGULAR_REGULAR': { finish: 'しっとり', desc: '髪をしっかりまとめたい方のための、しっとりとした組み合わせです。' },
};
const COMBO_ORDER = ['REPAIR_AIR', 'REPAIR_REPAIR', 'REPAIR_REGULAR', 'REGULAR_AIR', 'REGULAR_REPAIR', 'REGULAR_REGULAR'];
const KANA = { AIR: 'エアー', REPAIR: 'リペア', REGULAR: 'レギュラー' };
const PRODUCT_IMAGES = {
  REGULAR_SP: 'images/tsururintyo/regular-sp.png',
  REGULAR_TR: 'images/tsururintyo/regular-tr.png',
  REPAIR_SP: 'images/tsururintyo/repair-sp.png',
  REPAIR_TR: 'images/tsururintyo/repair-tr.png',
  AIR_TR: 'images/tsururintyo/air-tr.png',
  BOOSTER: 'images/tsururintyo/booster.png',
};
const TREATMENT_TONE = {
  REGULAR: { bg: '#f4f1e9', border: '#c9bfa0', hoverBg: '#ece5d3', hoverBorder: '#ab9968' },
  REPAIR: { bg: '#e9dcc6', border: '#a9865c', hoverBg: '#ddc9a6', hoverBorder: '#8f6c45' },
  AIR: { bg: '#f0dfd6', border: '#cb9884', hoverBg: '#e6c9b8', hoverBorder: '#b87c63' },
};
const REVIEW_STATS = {
  REPAIR_REPAIR: {
    label: '実際に使った方の声', keepUsing: '4.7', firstUsePercent: 83, recommend: '4.4',
    voices: [
      '乾かしただけなのにサラッサラで、翌朝も潤いがありながらヘアセットなしで済むぐらいまとまっていてびっくりしました',
      'しっとりまとまっているけど、軽くてさらさらしている',
      '広がりが抑えられてた',
    ],
  },
  REGULAR_AIR: {
    label: '実際に使った方の声', keepUsing: '4.9', firstUsePercent: 71, recommend: '4.6',
    voices: [
      '毛先の絡まりがゼロでした。乾燥によるパサつきと広がりが全然気になりません',
      'とても軽くサラサラでした。ドライヤーで乾かす時も軽く感じました',
      '指通りが違う',
    ],
  },
  REGULAR_REGULAR: {
    label: '実際に使った方の声', keepUsing: '4.1', firstUsePercent: 71, recommend: '3.7',
    voices: [
      'まとまりがよく、朝のセットが楽になりました！',
      'ツヤ感とまとまり',
      'まとまりがよかった',
    ],
  },
  REPAIR_AIR: {
    label: '似た組み合わせの声', keepUsing: '4.7', firstUsePercent: null, recommend: '4.4',
    voices: [
      '（リペアシャンプー）気になっていた手触りがサロン後のトリートメントしたかのようにまとまりがよい',
      '（エアートリートメント）毛先の絡まりがゼロで、軽さとサラサラ感を実感',
    ],
  },
  REPAIR_REGULAR: {
    label: '似た組み合わせの声', keepUsing: '4.7', firstUsePercent: null, recommend: '4.4',
    voices: [
      '（リペアシャンプー）指通りが違う、手触りの変化をすぐ実感',
      '（レギュラートリートメント）ツヤ感とまとまりが出て朝のセットが楽に',
    ],
  },
};

let state = { answers: [], stepIndex: 0, override: null, copied: false };

function computeResult(answers, override) {
  let shampoo, treatment, booster;
  if (override) {
    [shampoo, treatment] = override.split('_');
    booster = false;
  } else {
    const map = {};
    answers.forEach(a => { map[a.key] = a.value; });
    shampoo = (map.damage >= 1 || map.hairType < 0) ? 'REPAIR' : 'REGULAR';
    treatment = map.finish < 0 ? 'AIR' : (map.finish > 0 ? 'REGULAR' : 'REPAIR');
    booster = map.styling >= 2 || map.scalp >= 1;
  }
  const key = `${shampoo}_${treatment}`;
  const combo = COMBOS[key];
  const idx = COMBO_ORDER.indexOf(key);
  const toPair = (k) => {
    const [s, t] = k.split('_');
    return { key: k, shampoo: s, treatment: t, shampooKana: KANA[s], treatmentKana: KANA[t] };
  };
  const lighter = idx > 0 ? toPair(COMBO_ORDER[idx - 1]) : null;
  const heavier = idx < COMBO_ORDER.length - 1 ? toPair(COMBO_ORDER[idx + 1]) : null;
  return {
    shampoo, treatment, booster, finish: combo.finish, desc: combo.desc, lighter, heavier,
    shampooKana: KANA[shampoo], treatmentKana: KANA[treatment],
    shampooImg: PRODUCT_IMAGES[`${shampoo}_SP`] || null,
    treatmentImg: PRODUCT_IMAGES[`${treatment}_TR`] || null,
    boosterImg: PRODUCT_IMAGES.BOOSTER,
    reviewStats: REVIEW_STATS[key] || null,
  };
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function selectOption(key, value) {
  state = { ...state, answers: [...state.answers, { key, value }], stepIndex: state.stepIndex + 1 };
  render();
}
function goBack() {
  if (state.answers.length === 0) return;
  state = { ...state, answers: state.answers.slice(0, -1), stepIndex: state.stepIndex - 1 };
  render();
}
function restart() {
  state = { answers: [], stepIndex: 0, override: null, copied: false };
  render();
}
function jumpToCombo(comboKey) {
  state = { ...state, override: comboKey };
  render();
}
function copyLink() {
  try { navigator.clipboard && navigator.clipboard.writeText(window.location.href); } catch (e) {}
  state = { ...state, copied: true };
  render();
  setTimeout(() => { state = { ...state, copied: false }; render(); }, 2000);
}

function renderAltBox(pair, label) {
  const tone = TREATMENT_TONE[pair.treatment];
  return `
    <button class="alt-box" data-jump="${pair.key}" style="background:${tone.bg};border:1px solid ${tone.border};">
      <div class="alt-label">${label}</div>
      <div class="alt-combo">${pair.shampoo} × ${pair.treatment}</div>
      <div class="alt-kana">${pair.shampooKana} × ${pair.treatmentKana}</div>
    </button>`;
}

function renderResult() {
  const result = computeResult(state.answers, state.override);
  const shareText = `わたしにぴったりなのは「${result.shampoo} × ${result.treatment}」でした！ #つるりんちょ診断`;
  const shareUrlX = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}`;
  const shareUrlLine = `https://social-plugins.line.me/lineit/share?text=${encodeURIComponent(shareText)}`;

  let html = `<div class="stack" style="align-items:center;">
    <div class="kicker" style="margin-bottom:0;">Your Result</div>
    <span class="tag">${escapeHtml(result.finish)}</span>
    <div class="result-title-row">
      <div><h1>${result.shampoo}</h1><span class="result-kana">${result.shampooKana}</span></div>
      <h1 style="margin-bottom:18px;">×</h1>
      <div><h1>${result.treatment}</h1><span class="result-kana">${result.treatmentKana}</span></div>
    </div>
    <p style="font-size:17px; line-height:1.9; text-align:justify; max-width:520px; margin:0;">${escapeHtml(result.desc)}</p>

    <div class="product-cards">
      <div class="card card-elev product-card">
        <div class="product-plate"><img src="${result.shampooImg}" alt="${result.shampoo}" loading="lazy"></div>
        <div class="product-label">Shampoo</div>
        <div class="product-name">${result.shampoo}</div>
        <div class="product-kana">${result.shampooKana}</div>
      </div>
      <div class="card card-elev product-card">
        <div class="product-plate"><img src="${result.treatmentImg}" alt="${result.treatment}" loading="lazy"></div>
        <div class="product-label">Treatment</div>
        <div class="product-name">${result.treatment}</div>
        <div class="product-kana">${result.treatmentKana}</div>
      </div>
    </div>

    <div class="alt-row">
      ${result.lighter ? renderAltBox(result.lighter, 'もう少し軽めなら') : ''}
      ${result.heavier ? renderAltBox(result.heavier, 'もう少し重めなら') : ''}
    </div>`;

  if (result.reviewStats) {
    const rs = result.reviewStats;
    html += `
    <div class="card card-elev review-card">
      <div class="review-label">${escapeHtml(rs.label)}</div>
      <div class="review-stats">
        <div class="review-stat"><div class="review-stat-num">${rs.keepUsing}<span class="review-stat-unit">/5</span></div><div class="review-stat-label">また使いたい度</div></div>
        ${rs.firstUsePercent != null ? `<div class="review-stat"><div class="review-stat-num">${rs.firstUsePercent}<span class="review-stat-unit">%</span></div><div class="review-stat-label">初回から効果実感</div></div>` : ''}
        <div class="review-stat"><div class="review-stat-num">${rs.recommend}<span class="review-stat-unit">/5</span></div><div class="review-stat-label">推薦度</div></div>
      </div>
      <div class="stack gap-4">
        ${rs.voices.map(v => `<p class="review-voice">「${escapeHtml(v)}」</p>`).join('')}
      </div>
    </div>`;
  }

  if (result.booster) {
    html += `
    <div class="card booster-card">
      <div class="booster-plate"><img src="${result.boosterImg}" alt="BOOSTER" loading="lazy"></div>
      <div>
        <div class="booster-kicker">+ Special Care</div>
        <div style="display:flex; align-items:baseline; gap:8px; margin-bottom:8px;">
          <span class="booster-name">BOOSTER</span><span class="booster-name-kana">ブースター</span>
        </div>
        <div class="booster-headline">3日に1回のリセットケアを入れるのもおすすめ！</div>
        <div class="booster-tagline">ビルドアップ解消</div>
        <p class="booster-desc">不要な蓄積をリセットすることで、補修成分が内部まで届きやすい環境へ整え、重みや絡まりを感じにくい、素直な髪へ導くスペシャルケア</p>
      </div>
    </div>`;
  }

  html += `
    <p class="caution">髪質・ダメージ・理想の仕上がりの3軸で選ぶのがポイントです。<br>重さだけで判断せず、スタッフにご相談ください。</p>
    <div class="stack gap-3" style="width:100%;">
      <button class="btn btn-primary btn-block" id="btn-restart">もう一度診断する</button>
    </div>
    <div class="stack" style="align-items:center; margin-top:var(--space-6);">
      <div style="width:100%; height:1px; background:var(--color-divider);"></div>
      <span style="font-size:12px; letter-spacing:0.15em; color:var(--color-neutral-700); text-transform:uppercase;">Share</span>
      <div class="share-row">
        <a class="btn btn-icon" href="${shareUrlX}" target="_blank" rel="noopener" aria-label="Xでシェア">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4l16 16M20 4L4 20"></path></svg>
        </a>
        <a class="btn btn-icon" href="${shareUrlLine}" target="_blank" rel="noopener" aria-label="LINEでシェア">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </a>
        <button class="btn btn-icon" id="btn-copy" aria-label="リンクをコピー">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
        </button>
      </div>
      ${state.copied ? '<span style="font-size:12px;color:var(--color-accent-700);">リンクをコピーしました</span>' : ''}
    </div>
  </div>`;
  return html;
}

function renderQuestion() {
  const total = QUESTIONS.length;
  const question = QUESTIONS[state.stepIndex];
  const stepNumber = Math.min(state.stepIndex + 1, total);
  const progressPct = Math.round((state.stepIndex / total) * 100);
  const canGoBack = state.answers.length > 0;
  return `
    <div class="stack">
      <div class="step-row">
        ${canGoBack ? '<button class="btn btn-ghost" id="btn-back" style="font-size:13px;">← 戻る</button>' : '<span></span>'}
        <span class="step-count">STEP ${stepNumber} / ${total}</span>
      </div>
      <div class="progress-track"><div class="progress-bar" style="width:${progressPct}%;"></div></div>
      <div class="q-title"><h2>${escapeHtml(question.text)}</h2></div>
      <p class="q-hint">${escapeHtml(question.hint)}</p>
      <div>
        ${question.options.map((opt, i) => `<button class="btn btn-option btn-block" data-key="${question.key}" data-value="${opt.value}">${escapeHtml(opt.label)}</button>`).join('')}
      </div>
    </div>`;
}

function render() {
  const total = QUESTIONS.length;
  const isResult = state.stepIndex >= total;
  document.getElementById('hero-block').style.display = state.stepIndex === 0 && !isResult ? '' : 'none';
  const app = document.getElementById('app');
  app.innerHTML = isResult ? renderResult() : renderQuestion();

  app.querySelectorAll('[data-key]').forEach(btn => {
    btn.addEventListener('click', () => selectOption(btn.dataset.key, Number(btn.dataset.value)));
  });
  const backBtn = document.getElementById('btn-back');
  if (backBtn) backBtn.addEventListener('click', goBack);
  const restartBtn = document.getElementById('btn-restart');
  if (restartBtn) restartBtn.addEventListener('click', restart);
  const copyBtn = document.getElementById('btn-copy');
  if (copyBtn) copyBtn.addEventListener('click', copyLink);
  app.querySelectorAll('[data-jump]').forEach(btn => {
    btn.addEventListener('click', () => jumpToCombo(btn.dataset.jump));
  });
}

render();
</script>

</body>
</html>
